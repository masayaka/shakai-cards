# 表記ルール辞書(カード生成時に適用する採点基準準拠ルール)
# 出典: 構築指示書_単語カード日次自動化パイプライン.md §3.2
# 追記式。定期考査の答案分析で判明した学校の採点基準を都度追加する。
# 初版: 2026-07-09(第2回定期考査の答案分析より。Claude Code家庭端末が起草)

version: 1
updated: "2026-07-09"

rules:
  # --- 全教科共通 ---
  - id: kyotsu-001
    scope: 全教科
    rule: 答えの表記は学校の模範解答・採点基準に合わせる。カード独自の言い換えをしない
    source: 単語カード運用方針.md 補足ルール

  # --- 技術 ---
  - id: gijutsu-001
    scope: 技術
    rule: 記号「~」の読みは「チルダ」を第一表記とする(「波形」は括弧内の補足に格下げ)
    evidence: 第2回定期考査でカード表記「波形」と解答し不正解。学校模範解答は「チルダ」

  # --- 英語系(英語G・英語R・塾AIE) ---
  - id: eigo-001
    scope: 英語系
    rule: 問題文(q)に英字を含めない(答えバレ防止)。連語・活用・発音注意は答え(a)側に集約
    check: 正規表現 [A-Za-z] が q にヒットしないこと(機械検証 3.3-5)
  - id: eigo-002
    scope: 英語系
    rule: 序数・月名・国名などスペル不規則語は「書ける」ことが採点対象。カードの答えに正確なスペルを明記
    evidence: 第2回英語Rで序数スペル4問失点(thirth/twelveth/twentyth/thirteen)。カード収録済みでも「見て分かる」止まりだった

  # --- 理科 ---
  - id: rika-001
    scope: 理科α
    rule: 化学式は元素の順序まで正確に(例:硫化水素は H2S。SH2 は不正解)
    evidence: 第2回理科αで SH2 と解答し不正解
  - id: rika-002
    scope: 理科β
    rule: 記述解答は模範解答のキーワード(採点ポイント)を答え側に箇条書きで明示する(例:カモノハシ=卵生+母乳で育てる)
    evidence: 第2回理科β大問10で「母乳で育てる」の観点欠落により減点

  # --- 社会 ---
  - id: shakai-001
    scope: 社会
    rule: 海流・地名などで複数表記がある語は、学校が要求する側を第一表記にしつつ許容表記を併記(例:黒潮(日本海流)— 第2回では日本海流でも正解だった)
    evidence: 第2回社会 問5(1)Y「日本海流」に赤○

  # --- 国語 ---
  - id: kokugo-001
    scope: 国語β
    rule: 活用の行はカタカナで表記(例:ガ行上一段活用)。ひらがな表記との差で×になる可能性があるため(要確認事項として継続観察)
    evidence: 第2回国語βで「が行上一段」が×(理由は紙面から未確定・要確認)

  # --- 穴埋めプリント ---
  - id: anaume-001
    scope: 全教科
    rule: 穴埋めプリントは「四角・括弧の中身そのものを問う」カードを必ず含める
    source: 構築指示書 §3.2
