<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>社会 暗記カード</title>
<style>
  :root{
    --ink:#13241c; --paper:#f3efe4; --moss:#2f6b4f; --moss-d:#1f4a36;
    --clay:#c2602f; --gold:#caa54b; --line:#d6cfbd; --aji:#3a5a8c;
    --good:#2f6b4f; --again:#b4502a; --sky:#dbeaf2; --cream:#fffdf7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--paper);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;}
  header{padding:10px 16px 8px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  header h1{font-size:15px;margin:0;letter-spacing:.04em;font-weight:800;}
  header h1 span{color:var(--moss);}
  .points{font-variant-numeric:tabular-nums;font-size:15px;font-weight:800;color:var(--clay);}
  .points small{font-size:11px;color:#9a917c;font-weight:700;}

  /* キャラパネル */
  .pet{display:flex;align-items:center;gap:12px;padding:10px 16px;
    background:linear-gradient(180deg,#eef5f1,#e7f0ea);border-bottom:1px solid var(--line);position:relative;overflow:hidden;}
  .pet .avatar{font-size:42px;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12));transition:transform .2s;}
  .pet.evolve .avatar{animation:pop .9s ease;}
  @keyframes pop{0%{transform:scale(.5) rotate(-8deg);}40%{transform:scale(1.35) rotate(6deg);}70%{transform:scale(.95);}100%{transform:scale(1);}}
  .pet .info{flex:1;min-width:0;}
  .pet .pname{font-size:14px;font-weight:800;color:var(--moss-d);line-height:1.2;}
  .pet .pword{font-size:11px;color:#6f7d72;margin-top:1px;}
  .pet .evobar{height:7px;background:#d4e2d8;border-radius:99px;margin-top:6px;overflow:hidden;}
  .pet .evobar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--moss),var(--gold));transition:width .4s;}
  .pet .evonext{font-size:10px;color:#8a9389;margin-top:3px;font-variant-numeric:tabular-nums;}

  /* マスター進捗 */
  .master{padding:7px 16px 8px;border-bottom:1px solid var(--line);background:var(--cream);}
  .master .row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:800;color:var(--moss-d);}
  .master .row b{color:var(--clay);font-variant-numeric:tabular-nums;}
  .master .bar{height:5px;background:var(--line);border-radius:99px;margin-top:5px;overflow:hidden;}
  .master .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--aji),var(--moss));transition:width .3s;}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px;gap:12px;position:relative;}
  .cat{font-size:11px;font-weight:800;letter-spacing:.12em;padding:3px 11px;border-radius:999px;}
  .cat.jp{background:#e4efe7;color:var(--moss-d);} .cat.aj{background:#e5ecf5;color:var(--aji);}
  .card{width:100%;max-width:520px;min-height:34dvh;background:var(--cream);border:1px solid var(--line);
    border-radius:20px;box-shadow:0 10px 28px rgba(31,74,54,.10);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:26px 22px;cursor:pointer;position:relative;transition:transform .12s;}
  .card:active{transform:scale(.992);}
  .qlabel{position:absolute;top:13px;left:16px;font-size:11px;font-weight:800;letter-spacing:.14em;color:#a89f88;}
  .rank{position:absolute;top:13px;right:14px;font-size:11px;font-weight:800;color:#bcae8f;font-variant-numeric:tabular-nums;}
  .qtext{font-size:20px;line-height:1.5;font-weight:700;}
  .atext{font-size:26px;line-height:1.45;font-weight:800;color:var(--moss-d);}
  .hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:12px;color:#a89f88;}

  /* コンボ・獲得表示 */
  .combo{height:22px;font-size:14px;font-weight:800;color:var(--clay);display:flex;align-items:center;gap:5px;}
  .combo.hidden{opacity:0;}
  .float{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-size:30px;font-weight:900;
    pointer-events:none;opacity:0;}
  .float.go{animation:floatup 1s ease-out;}
  .float.plus{color:var(--good);} .float.minus{color:var(--again);} .float.bonus{color:var(--gold);}
  @keyframes floatup{0%{opacity:0;transform:translate(-50%,10px) scale(.7);}25%{opacity:1;}100%{opacity:0;transform:translate(-50%,-46px) scale(1.15);}}

  .controls{width:100%;max-width:520px;display:flex;gap:12px;}
  .btn{flex:1;border:none;border-radius:14px;padding:15px 10px;font-size:15px;font-weight:800;color:#fff;
    cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:transform .1s;}
  .btn:active{transform:translateY(1px);}
  .btn.again{background:var(--again);} .btn.good{background:var(--good);} .btn.big{background:var(--moss);}
  .reveal{width:100%;max-width:520px;} .reveal .btn{width:100%;}

  footer{padding:8px 14px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .seg{display:flex;gap:6px;}
  .chip{font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;border:1px solid var(--line);
    background:var(--cream);color:#5b5444;cursor:pointer;}
  .chip.on{background:var(--moss);color:#fff;border-color:var(--moss);}
  .restart{font-size:11px;font-weight:700;color:var(--clay);background:none;border:none;cursor:pointer;text-decoration:underline;}

  .toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:9;
    background:var(--moss-d);color:#fff;padding:12px 20px;border-radius:14px;font-weight:800;font-size:15px;
    box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;text-align:center;}
  .toast.show{animation:toast 2.2s ease;}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,-8px);}12%{opacity:1;transform:translate(-50%,0);}80%{opacity:1;}100%{opacity:0;}}
  .toast .big{font-size:30px;display:block;margin-bottom:2px;}

  .done{text-align:center;max-width:520px;padding:0 6px;}
  .done h2{font-size:22px;margin:.2em 0;color:var(--moss-d);}
  .done p{color:#6a6354;font-size:14px;line-height:1.7;}
  .done .hero{font-size:64px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<header>
  <h1>社会 <span>暗記カード</span></h1>
  <div class="points">🪙 <span id="pts">0</span><small> ポイント</small></div>
</header>

<div class="pet" id="pet">
  <div class="avatar" id="avatar">🥚</div>
  <div class="info">
    <div class="pname" id="pname">たまご</div>
    <div class="pword" id="pword">なにかが ねむっている…</div>

    <div class="evonext" id="evonext"></div>
  </div>
</div>

<div class="master">

  <div class="bar"><i id="mbar"></i></div>
</div>

<main id="main">
  <div class="combo hidden" id="combo"></div>
  <div class="cat jp" id="cat">―</div>
  <div class="card" id="card" role="button" tabindex="0" aria-label="カードをめくる">
    <div class="qlabel" id="face">とい</div>
    <div class="rank" id="rank"></div>
    <div class="qtext" id="text">読み込み中…</div>
    <div class="hint" id="hint">タップで答え</div>
  </div>
  <div class="float" id="float"></div>
  <div class="reveal" id="revealWrap"><button class="btn big" id="revealBtn">答えを見る</button></div>
  <div class="controls" id="judgeWrap" style="display:none">
    <button class="btn again" id="againBtn">まちがえた</button>
    <button class="btn good" id="goodBtn">できた</button>
  </div>
</main>

<footer>
  <div class="seg">
    <button class="chip on" data-f="all">ぜんぶ</button>
    <button class="chip" data-f="日本の地形">地形</button>
    <button class="chip" data-f="アジア">アジア</button>
  </div>
  <button class="restart" id="restart">記録リセット</button>
</footer>

<div class="toast" id="toast"></div>

: "アジア", "q": "北京・上海・香港のうち、中国の首都はどれか。", "a": "北京", "id": 167}, {"cat": "アジア", "q": "北京・上海・香港のうち、中国最大の都市はどれか。", "a": "上海", "id": 168}, {"cat": "アジア", "q": "ソウル・プサンのうち、韓国の首都はどれか。", "a": "ソウル", "id": 169}, {"cat": "アジア", "q": "中華人民共和国・中華民国のうち、台湾の国名はどれか。", "a": "中華民国", "id": 170}, {"cat": "アジア", "q": "社会主義国は、大韓民国・北朝鮮のどちらか。", "a": "北朝鮮", "id": 171}, {"cat": "アジア", "q": "資本主義国は、大韓民国・北朝鮮のどちらか。", "a": "大韓民国", "id": 172}, {"cat": "アジア", "q": "日清戦争が起きたのは何年か。", "a": "1894年", "id": 173}, {"cat": "アジア", "q": "日露戦争が起きたのは何年か。", "a": "1904年", "id": 174}, {"cat": "アジア", "q": "日韓併合が行われたのは何年か。", "a": "1910年", "id": 175}, {"cat": "アジア", "q": "朝鮮戦争が始まったのは何年か。", "a": "1950年", "id": 176}, {"cat": "アジア", "q": "アジアのモンスーン地帯にあたるのは、東〜南アジア・西アジアどちらか。", "a": "東〜南アジア", "id": 177}, {"cat": "アジア", "q": "玄武岩でできたインドの高原を何というか。", "a": "デカン高原", "id": 178}, {"cat": "アジア", "q": "古代四大文明がおこったインドの平原は。", "a": "インダス平原", "id": 179}];
const STEPS = [10,20,40,80,160,320];
const MASTER_RANK = 2;              // rank>=2 を「覚えた」とみなす（2回連続正解）
const KEY = "shakai_game_v1";

// 育成ステージ（累計ポイント）
const STAGES = [
  {pt:0,   emoji:"🥚", name:"たまご",            word:"なにかが ねむっている…"},
  {pt:15,  emoji:"🐛", name:"いのちのめばえ",     word:"うごきだした！"},
  {pt:40,  emoji:"🐟", name:"さかな",            word:"うみを およいでいる"},
  {pt:80,  emoji:"🦎", name:"りくの いきもの",    word:"りくに あがった！"},
  {pt:140, emoji:"🦕", name:"きょうりゅう",        word:"ぐんぐん そだっている"},
  {pt:210, emoji:"🦖", name:"つよい きょうりゅう", word:"もう だれにも まけない"},
  {pt:300, emoji:"🐉", name:"でんせつの ドラゴン", word:"でんせつに なった！"}
];

let filter="all";
let data = load();   // {srs:{id:{rank}}, points, maxCombo, stageIdx}
let queue=[], tick=0, combo=0, showing="q", curId=null, session={done:0};

function load(){
  try{ const d=JSON.parse(localStorage.getItem(KEY)); if(d&&d.srs) return d; }catch(e){}
  return {srs:{}, points:0, maxCombo:0, stageIdx:0};
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){} }

function pool(){ return ALL.filter(c=> filter==="all" || c.cat===filter); }
function rankOf(id){ const s=data.srs[id]; return (s&&s.rank!=null)? s.rank : -1; }

function schedule(id, ok){
  let r=rankOf(id);
  r = ok ? Math.min(STEPS.length-1,(r<0?0:r)+1) : 0;
  data.srs[id]={rank:r};
  const N=STEPS[r];
  return tick + Math.max(2, Math.round(N*(0.6+Math.random()*0.4)));
}

function stageFor(pts){ let i=0; for(let k=0;k<STAGES.length;k++){ if(pts>=STAGES[k].pt) i=k; } return i; }

function rebuild(){
  tick=0; queue=[]; combo=0; session={done:0};
  const ps=pool();
  const fresh=ps.filter(c=>rankOf(c.id)<0), seen=ps.filter(c=>rankOf(c.id)>=0);
  shuffle(fresh); shuffle(seen);
  let t=0;
  fresh.forEach(c=>{ queue.push({id:c.id,due:t}); t+=1; });
  seen.forEach(c=>{ const N=STEPS[rankOf(c.id)]; queue.push({id:c.id,due:t+Math.round(N*(0.3+Math.random()*0.5))}); });
  render();
}
function nextCard(){ if(!queue.length)return null; queue.sort((a,b)=>a.due-b.due); return queue[0]; }
function byId(id){ return ALL.find(c=>c.id===id); }

const CARDHTML = document.getElementById('main').innerHTML;
function bindCard(){
  document.getElementById('card').addEventListener('click',()=>{ if(showing==="q") reveal(); });
  document.getElementById('card').addEventListener('keydown',e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault(); showing==="q"?reveal():judge(true);} });
  document.getElementById('revealBtn').onclick=reveal;
  document.getElementById('againBtn').onclick=()=>judge(false);
  document.getElementById('goodBtn').onclick=()=>judge(true);
}

function renderPet(){
  const idx=stageFor(data.points); const st=STAGES[idx];
  document.getElementById('avatar').textContent=st.emoji;
  document.getElementById('pname').textContent=st.name;
  document.getElementById('pword').textContent=st.word;
  const next=STAGES[idx+1];
  const eb=document.getElementById('evobar'), en=document.getElementById('evonext');
  if(next){ const span=next.pt-st.pt; const cur=data.points-st.pt;
    eb.style.width=Math.max(0,Math.min(100,cur/span*100))+"%";
    en.textContent="つぎの しんかまで あと "+(next.pt-data.points)+" ポイント"; }
  else { eb.style.width="100%"; en.textContent="さいだい しんか！ でんせつたっせい"; }
}
function renderMaster(){
  const ps=pool();
  const mastered=ps.filter(c=>rankOf(c.id)>=MASTER_RANK).length;
  const left=ps.length-mastered;
  const pct=ps.length? Math.round(mastered/ps.length*100):0;
  document.getElementById('left').textContent=left;
  document.getElementById('mpct').textContent=pct;
  document.getElementById('mbar').style.width=pct+"%";
}
function render(){
  if(!document.getElementById('card')){ document.getElementById('main').innerHTML=CARDHTML; bindCard(); }
  document.getElementById('pts').textContent=data.points;
  renderPet(); renderMaster();
  const nx=nextCard();
  if(!nx){ done(); return; }
  curId=nx.id; const c=byId(curId);
  document.getElementById('cat').textContent=c.cat;
  document.getElementById('cat').className="cat "+(c.cat==="アジア"?"aj":"jp");
  const r=rankOf(curId);
  document.getElementById('rank').textContent = r<0?"NEW":(r>=MASTER_RANK?"覚えた Lv."+(r+1):"Lv."+(r+1));
  const combEl=document.getElementById('combo');
  if(combo>=2){ combEl.classList.remove('hidden'); combEl.textContent="🔥 "+combo+" れんぞく！"; }
  else combEl.classList.add('hidden');
  if(showing==="q"){
    document.getElementById('face').textContent="とい";
    const t=document.getElementById('text'); t.textContent=c.q; t.className="qtext";
    document.getElementById('hint').style.display="block";
    document.getElementById('revealWrap').style.display="block";
    document.getElementById('judgeWrap').style.display="none";
  }else{
    document.getElementById('face').textContent="こたえ";
    const t=document.getElementById('text'); t.textContent=c.a; t.className="atext";
    document.getElementById('hint').style.display="none";
    document.getElementById('revealWrap').style.display="none";
    document.getElementById('judgeWrap').style.display="flex";
  }
}
function reveal(){ showing="a"; render(); }

function floatShow(txt, cls){
  const f=document.getElementById('float'); f.textContent=txt; f.className="float "+cls;
  void f.offsetWidth; f.classList.add('go');
  setTimeout(()=>{ f.className="float"; }, 1000);
}
function toast(html){
  const t=document.getElementById('toast'); t.innerHTML=html; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show');
}

function judge(ok){
  const id=curId; const beforeStage=stageFor(data.points);
  queue=queue.filter(q=>q.id!==id);
  const due=schedule(id, ok); queue.push({id,due});

  if(ok){
    data.points += 1; combo += 1;
    let bonus=0;
    if(combo%10===0) bonus+=5; else if(combo%5===0) bonus+=3;
    data.points += bonus;
    if(combo>data.maxCombo) data.maxCombo=combo;
    if(bonus){ floatShow("+"+(1+bonus),"bonus"); toast('<span class="big">🔥</span>'+combo+'れんぞく ボーナス +'+bonus+'！'); }
    else floatShow("+1","plus");
  }else{
    data.points=Math.max(0,data.points-1); combo=0;
    floatShow("-1","minus");
  }
  session.done++; showing="q"; tick++;

  const afterStage=stageFor(data.points);
  if(afterStage>beforeStage){
    const st=STAGES[afterStage];
    document.getElementById('pet').classList.add('evolve');
    setTimeout(()=>document.getElementById('pet').classList.remove('evolve'),900);
    toast('<span class="big">'+st.emoji+'</span>しんか！「'+st.name+'」になった！');
  }
  // 全問マスター判定
  const ps=pool(); const mastered=ps.filter(c=>rankOf(c.id)>=MASTER_RANK).length;
  save();
  if(mastered===ps.length && ps.length>0 && ok && afterStage<=beforeStage){
    toast('<span class="big">🎉</span>このはんい ぜんぶ覚えた！');
  }
  render();
}

function done(){
  const idx=stageFor(data.points); const st=STAGES[idx];
  document.getElementById('main').innerHTML=
    '<div class="done"><div class="hero">'+st.emoji+'</div>'+
    '<h2>このセット完了！</h2>'+
    '<p>いまの あいぼう：<b>'+st.name+'</b><br>ポイント '+data.points+' ／ さいこうコンボ '+data.maxCombo+'<br><br>'+
    'まちがえたカードは早めに、できたカードはだんだん間をあけて出てくるよ。<br>「ぜんぶ覚えた」まで つづけよう！</p>'+
    '<button class="btn big" id="againAll" style="max-width:320px;margin-top:10px;">もう一周する</button></div>';
  document.getElementById('againAll').onclick=rebuild;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

bindCard();
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  ch.classList.add('on'); filter=ch.dataset.f; showing="q"; rebuild();
});
document.getElementById('restart').onclick=()=>{
  if(confirm("覚えた記録・ポイント・キャラを ぜんぶ消して 最初からにする？")){
    data={srs:{},points:0,maxCombo:0,stageIdx:0}; save(); showing="q"; rebuild();
  }
};
rebuild();
</script>
</body>
