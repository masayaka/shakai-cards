<head>
<meta charset="UTF-8">

<title>莉奈の暗記カード</title>
<style>
  :root{
    --ink:#1d2622; --paper:#eef1ee; --main:#2f6b4f; --mainD:#1f4a36; --gold:#caa54b;
    --line:#d6cfbd; --cream:#fffdf9; --good:#2f6b4f; --again:#b4502a; --petA:#eef5f1; --petB:#e7f0ea;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--paper);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;transition:background .3s;}

  /* ===== ホーム ===== */
  #home{flex:1;display:flex;flex-direction:column;padding:22px 18px calc(18px + env(safe-area-inset-bottom));gap:16px;overflow-y:auto;}
  .home-head{text-align:center;margin-top:6px;}
  .home-head h1{font-size:21px;margin:0;font-weight:800;letter-spacing:.04em;color:var(--mainD);}
  .home-head p{font-size:12px;color:#7c8079;margin:5px 0 0;}
  .subjects{display:flex;flex-direction:column;gap:13px;max-width:520px;width:100%;margin:4px auto 0;}
  .scard{display:flex;align-items:center;gap:14px;background:var(--cream);border:1px solid var(--line);
    border-radius:18px;padding:15px 16px;cursor:pointer;box-shadow:0 6px 18px rgba(31,74,54,.07);
    transition:transform .1s,box-shadow .1s;text-align:left;width:100%;font-family:inherit;}
  .scard:active{transform:scale(.985);}
  .scard .emo{font-size:38px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.12));}
  .scard .body{flex:1;min-width:0;}
  .scard .nm{font-size:17px;font-weight:800;color:var(--mainD);}
  .scard .meta{font-size:11px;color:#8b8f88;margin-top:1px;}
  .scard .pbar{height:6px;background:#e7e2d6;border-radius:99px;margin-top:7px;overflow:hidden;}
  .scard .pbar > i{display:block;height:100%;width:0;border-radius:99px;transition:width .4s;}
  .scard .go{font-size:22px;color:#c3bca9;font-weight:800;}
  .home-foot{text-align:center;font-size:11px;color:#9a9e96;margin-top:auto;padding-top:10px;}
  .exportBtn{margin:6px auto 0;display:block;font-size:12px;font-weight:700;color:var(--main);background:var(--cream);border:1px solid var(--line);border-radius:99px;padding:9px 18px;cursor:pointer;font-family:inherit;}
  .exportBtn:active{transform:translateY(1px);}

  /* ===== ゲーム ===== */
  #game{flex:1;display:none;flex-direction:column;min-height:100dvh;}
  #game.on{display:flex;}
  header{padding:9px 14px 8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .back{font-size:18px;font-weight:800;color:var(--main);background:none;border:none;cursor:pointer;padding:2px 6px;font-family:inherit;}
  header h1{flex:1;font-size:15px;margin:0;font-weight:800;letter-spacing:.03em;}
  header h1 span{color:var(--main);}
  .points{font-variant-numeric:tabular-nums;font-size:15px;font-weight:800;color:var(--gold);white-space:nowrap;}
  .points small{font-size:11px;color:#9a9e96;font-weight:700;}

  .pet{display:flex;align-items:center;gap:14px;padding:13px 16px;
    background:linear-gradient(180deg,var(--petA),var(--petB));border-bottom:1px solid var(--line);overflow:hidden;}
  .pet .avatar{font-size:60px;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.22));}
  .pet.evolve .avatar{animation:pop 1s cubic-bezier(.3,1.6,.5,1);}
  @keyframes pop{0%{transform:scale(.4) rotate(-14deg);}35%{transform:scale(1.6) rotate(10deg);}55%{transform:scale(.9) rotate(-4deg);}75%{transform:scale(1.18) rotate(2deg);}100%{transform:scale(1);}}
  .pet .info{flex:1;min-width:0;}
  .pet .pname{font-size:14px;font-weight:800;color:var(--mainD);}
  .pet .pword{font-size:11px;color:#6f7d76;margin-top:1px;}
  .pet .evobar{height:7px;background:rgba(0,0,0,.08);border-radius:99px;margin-top:6px;overflow:hidden;}
  .pet .evobar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--main),var(--gold));transition:width .4s;}
  .pet .evonext{font-size:10px;color:#8a948c;margin-top:3px;font-variant-numeric:tabular-nums;}

  .master{padding:7px 16px 8px;border-bottom:1px solid var(--line);background:var(--cream);}
  .master .row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:800;color:var(--mainD);}
  .master .row b{color:var(--gold);font-variant-numeric:tabular-nums;}
  .master .bar{height:5px;background:var(--line);border-radius:99px;margin-top:5px;overflow:hidden;}
  .master .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--main),var(--good));transition:width .3s;}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px;gap:12px;position:relative;}
  .cat{font-size:11px;font-weight:800;letter-spacing:.08em;padding:3px 11px;border-radius:999px;background:#eee;color:#555;}
  .card{width:100%;max-width:520px;min-height:34dvh;background:var(--cream);border:1px solid var(--line);
    border-radius:20px;box-shadow:0 10px 28px rgba(0,0,0,.10);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:26px 22px;cursor:pointer;position:relative;transition:transform .12s;}
  .card:active{transform:scale(.992);}
  .qlabel{position:absolute;top:13px;left:16px;font-size:11px;font-weight:800;letter-spacing:.14em;color:#aaa49a;}
  .rank{position:absolute;top:13px;right:14px;font-size:11px;font-weight:800;color:#aaa49a;font-variant-numeric:tabular-nums;}
  .qtext{line-height:1.5;font-weight:700;transition:font-size .15s;}
  .qtext.big{font-size:20px;}
  .qtext.small{font-size:15px;color:#6b6f68;}
  .adiv{display:none;flex-direction:column;align-items:center;gap:6px;margin-top:14px;width:100%;}
  .adiv.show{display:flex;}
  .adiv .line{width:44px;height:3px;background:var(--gold);border-radius:2px;}
  .adiv .alabel{font-size:11px;font-weight:800;letter-spacing:.14em;color:#aaa49a;}
  .atext{font-size:25px;line-height:1.45;font-weight:800;color:var(--mainD);}
  .hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:12px;color:#aaa49a;}

  .combo{height:24px;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:5px;transition:color .15s;}
  .combo.hidden{opacity:0;}
  .combo b{font-weight:900;}
  .combo.hot1{color:var(--gold);}
  .combo.hot2{color:#e8821f;}
  .combo.hot3{color:#e0492a;}
  .combo.hot4{color:#c0392b;animation:cpulse .55s infinite alternate;}
  .combo.hot5{font-size:16.5px;animation:crainbow 1.1s linear infinite, cpulse .4s infinite alternate;}
  @keyframes cpulse{from{transform:scale(1);}to{transform:scale(1.13);}}
  @keyframes crainbow{0%{color:#e0492a;}25%{color:#e8821f;}50%{color:#caa54b;}75%{color:#6a4d9c;}100%{color:#e0492a;}}

  #celebrate{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 38%, rgba(40,55,46,.72), rgba(15,22,18,.9));
    overflow:hidden;text-align:center;padding:24px;}
  #celebrate.on{display:flex;animation:cfade .35s ease;}
  @keyframes cfade{from{opacity:0;}to{opacity:1;}}
  #celebrate .bigEmoji{font-size:118px;line-height:1;filter:drop-shadow(0 8px 18px rgba(0,0,0,.5));
    animation:hero 1.25s cubic-bezier(.2,1.5,.4,1);}
  @keyframes hero{0%{transform:scale(0) rotate(-45deg);opacity:0;}55%{transform:scale(1.35) rotate(10deg);opacity:1;}78%{transform:scale(.92) rotate(-4deg);}100%{transform:scale(1) rotate(0);}}
  #celebrate .ribbon{margin-top:6px;font-size:13px;font-weight:800;letter-spacing:.2em;color:#ffe9b8;}
  #celebrate h2{color:#fff;font-size:30px;margin:8px 0 6px;text-shadow:0 2px 10px rgba(0,0,0,.45);font-weight:900;}
  #celebrate p{color:#ffe9b8;font-size:15px;font-weight:700;line-height:1.6;margin:0;}
  #celebrate .tapclose{margin-top:22px;color:#fff;font-size:13px;font-weight:700;opacity:.9;
    border:1.5px solid rgba(255,255,255,.55);padding:11px 26px;border-radius:99px;}
  .confetti{position:absolute;top:-24px;width:10px;height:16px;opacity:.96;will-change:transform;}
  @keyframes fall{0%{transform:translateY(-30px) rotate(0deg);}100%{transform:translateY(104vh) rotate(760deg);}}
  .float{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-size:30px;font-weight:900;pointer-events:none;opacity:0;}
  .float.go{animation:floatup 1s ease-out;}
  .float.plus{color:var(--good);} .float.minus{color:var(--again);} .float.bonus{color:var(--gold);}
  @keyframes floatup{0%{opacity:0;transform:translate(-50%,10px) scale(.7);}25%{opacity:1;}100%{opacity:0;transform:translate(-50%,-46px) scale(1.15);}}

  .controls{width:100%;max-width:520px;display:flex;gap:12px;}
  .btn{flex:1;border:none;border-radius:14px;padding:15px 10px;font-size:15px;font-weight:800;color:#fff;
    cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:transform .1s;}
  .btn:active{transform:translateY(1px);}
  .btn.again{background:var(--again);} .btn.good{background:var(--good);} .btn.big{background:var(--main);}
  .reveal{width:100%;max-width:520px;} .reveal .btn{width:100%;}

  footer{padding:8px 14px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .seg{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;border:1px solid var(--line);
    background:var(--cream);color:#5b5444;cursor:pointer;font-family:inherit;}
  .chip.on{background:var(--main);color:#fff;border-color:var(--main);}
  .restart{font-size:11px;font-weight:700;color:var(--again);background:none;border:none;cursor:pointer;text-decoration:underline;white-space:nowrap;}

  .toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:9;
    background:var(--mainD);color:#fff;padding:12px 20px;border-radius:14px;font-weight:800;font-size:15px;
    box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;text-align:center;}
  .toast.show{animation:toast 2.2s ease;}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,-8px);}12%{opacity:1;transform:translate(-50%,0);}80%{opacity:1;}100%{opacity:0;}}
  .toast .big{font-size:30px;display:block;margin-bottom:2px;}

  .done{text-align:center;max-width:520px;padding:0 6px;}
  .done h2{font-size:22px;margin:.2em 0;color:var(--mainD);}
  .done p{color:#5f6f69;font-size:14px;line-height:1.7;}
  .done .hero{font-size:64px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
.qimg{display:none;max-width:88%;max-height:120px;margin:2px auto 12px;}
</style>
</head>

<div id="home">
  <div class="home-head">
    <h1>莉奈の暗記カード</h1>
    <p>きょうは どれを やる？</p>
    <div id="syncDot" style="font-size:11px;font-weight:700;margin-top:5px;color:#9a9e96;">📱 この端末のみ</div>
  </div>
  <div class="subjects" id="subjects"></div>
  <button id="exportBtn" class="exportBtn">📄 学習きろくを書き出す（CSV）</button>
  <div class="home-foot">まちがえたカードは早めに、覚えたカードはだんだん間をあけて出てくるよ</div>
</div>

<div id="game">
  <header>
    <button class="back" id="back">←</button>
    <h1 id="ghead"><span>―</span></h1>
    <div class="points">✦ <span id="pts">0</span><small> pt</small></div>
  </header>
  <div class="pet" id="pet">
    <div class="avatar" id="avatar">🥚</div>
    <div class="info">
      <div class="pname" id="pname">―</div>
      <div class="pword" id="pword">―</div>
      <div class="evobar"><i id="evobar"></i></div>
      <div class="evonext" id="evonext"></div>
    </div>
  </div>
  <div class="master">
    <div class="row"><span>ぜんぶ覚えるまで</span><span>あと <b id="left">―</b> 枚（<span id="mpct">0</span>%）</span></div>
    <div class="bar"><i id="mbar"></i></div>
  </div>
  <main id="main">
    <div class="combo hidden" id="combo"></div>
    <div class="cat" id="cat">―</div>
    <div class="card" id="card" role="button" tabindex="0">
      <div class="qlabel" id="face">とい</div>
      <div class="rank" id="rank"></div>
      <img id="qimg" class="qimg" alt=""><div class="qtext big" id="qtext">読み込み中…</div>
      <div class="adiv" id="adiv">
        <div class="line"></div>
        <div class="alabel">こたえ</div>
        <div class="atext" id="atext"></div>
      </div>
      <div class="hint" id="hint">タップで答え</div>
    </div>
    <div class="float" id="float"></div>
    <div class="reveal" id="revealWrap"><button class="btn big" id="revealBtn">答えを見る</button></div>
    <div class="controls" id="judgeWrap" style="display:none">
      <button class="btn again" id="againBtn">まちがえた</button>
      <button class="btn good" id="goodBtn">できた</button>
    </div>
  </main>
  <footer>
    <div class="seg" id="seg"></div>
    <button class="restart" id="restart">記録リセット</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<div id="celebrate">
  <div class="bigEmoji">🐉</div>
  <div class="ribbon">★ COMPLETE ★</div>
  <h2>🎉 ぜんぶ覚えた！ 🎉</h2>
  <p>―</p>
  <div class="tapclose">タップで とじる</div>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function readData(key){ try{ const d=JSON.parse(localStorage.getItem(key)); if(d&&d.srs) return d; }catch(e){} return {srs:{},points:0,maxCombo:0}; }
function stageIdx(stages,pts){ let i=0; for(let k=0;k<stages.length;k++){ if(pts>=stages[k].pt) i=k; } return i; }

let homeCategory = null; // null=トップ、文字列=カテゴリ内表示
function subjectCardEl(key){
  const s=SUBJECTS[key]; const d=readData(s.key);
  const mastered=s.cards.filter(c=>{const x=d.srs[c.id];return x&&x.rank>=MASTER_RANK;}).length;
  const pct=Math.round(mastered/s.cards.length*100);
  const si=stageIdx(s.stages,d.points); const emo=s.stages[si].emoji;
  const btn=document.createElement('button'); btn.className="scard";
  btn.style.setProperty('--main',s.theme.main);
  btn.innerHTML=
    '<div class="emo">'+emo+'</div>'+
    '<div class="body"><div class="nm" style="color:'+s.theme.mainD+'">'+s.icon+' '+s.name+'</div>'+
    '<div class="meta">'+s.cards.length+'枚 ／ 覚えた '+mastered+'（'+pct+'%）・'+s.stages[si].name+'</div>'+
    '<div class="pbar"><i style="width:'+pct+'%;background:linear-gradient(90deg,'+s.theme.main+','+s.theme.gold+')"></i></div></div>'+
    '<div class="go">›</div>';
  btn.onclick=()=>enterSubject(key);
  return btn;
}
function renderHome(){
  const wrap=document.getElementById('subjects'); wrap.innerHTML="";
  const keys=Object.keys(SUBJECTS);
  if(homeCategory){
    // カテゴリ内表示：戻るボタン＋カテゴリ所属教科
    const back=document.createElement('button'); back.className="scard";
    back.style.setProperty('--main','#888');
    back.innerHTML='<div class="emo">↩️</div><div class="body"><div class="nm" style="color:#555">もどる</div>'+
      '<div class="meta">トップへ戻る</div></div><div class="go">‹</div>';
    back.onclick=()=>{ homeCategory=null; renderHome(); };
    wrap.appendChild(back);
    keys.filter(k=>SUBJECTS[k].category===homeCategory).forEach(k=>wrap.appendChild(subjectCardEl(k)));
    return;
  }
  // トップ：カテゴリなし教科を先に表示
  keys.filter(k=>!SUBJECTS[k].category).forEach(k=>wrap.appendChild(subjectCardEl(k)));
  // カテゴリフォルダを表示
  const cats=[...new Set(keys.map(k=>SUBJECTS[k].category).filter(Boolean))];
  cats.forEach(cat=>{
    const members=keys.filter(k=>SUBJECTS[k].category===cat);
    const total=members.reduce((n,k)=>n+SUBJECTS[k].cards.length,0);
    let mastered=0;
    members.forEach(k=>{ const s=SUBJECTS[k]; const d=readData(s.key);
      mastered+=s.cards.filter(c=>{const x=d.srs[c.id];return x&&x.rank>=MASTER_RANK;}).length; });
    const pct=total?Math.round(mastered/total*100):0;
    const btn=document.createElement('button'); btn.className="scard";
    btn.style.setProperty('--main','#4a5a8c');
    btn.innerHTML=
      '<div class="emo">📁</div>'+
      '<div class="body"><div class="nm" style="color:#31406b">'+cat+'</div>'+
      '<div class="meta">'+members.length+'教科 ／ '+total+'枚 ／ 覚えた '+mastered+'（'+pct+'%）</div>'+
      '<div class="pbar"><i style="width:'+pct+'%;background:linear-gradient(90deg,#4a5a8c,#caa54b)"></i></div></div>'+
      '<div class="go">›</div>';
    btn.onclick=()=>{ homeCategory=cat; renderHome(); };
    wrap.appendChild(btn);
  });
}

function applyTheme(t){
  const r=document.documentElement.style;
  ["paper","main","mainD","gold","line","good","again","petA","petB"].forEach(k=>r.setProperty('--'+k,t[k]));
}
function save(){ try{ localStorage.setItem(S.key, JSON.stringify(data)); }catch(e){}
  if(window.__SYNC__ && window.__SYNC__.enabled && window.__SYNC__.push){ try{ window.__SYNC__.push(collectAll()); }catch(e){} } }
function pool(){ return S.cards.filter(c=> filter==="all" || c.group===filter); }
function rankOf(id){ const s=data.srs[id]; return (s&&s.rank!=null)? s.rank : -1; }
function schedule(id, ok){
  let r=rankOf(id); r = ok ? Math.min(STEPS.length-1,(r<0?0:r)+1) : 0;
  const s = data.srs[id] || {};
  s.rank=r; s.seen=(s.seen||0)+1;
  if(ok) s.right=(s.right||0)+1; else s.wrong=(s.wrong||0)+1;
  s.last = Date.now();
  data.srs[id]=s; const N=STEPS[r];
  return tick + Math.max(2, Math.round(N*(0.6+Math.random()*0.4)));
}

function enterSubject(key){
  S=SUBJECTS[key]; curKey=key; applyTheme(S.theme);
  data=readData(S.key); filter="all";
  document.getElementById('ghead').innerHTML="<span>"+S.icon+"</span> "+S.name;
  // チップ生成
  const seg=document.getElementById('seg'); seg.innerHTML="";
  S.filters.forEach((f,i)=>{ const b=document.createElement('button');
    b.className="chip"+(i===0?" on":""); b.textContent=f[0]; b.dataset.f=f[1];
    b.onclick=()=>{ seg.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); b.classList.add('on'); filter=f[1]; showing="q"; rebuild(); };
    seg.appendChild(b); });
  document.getElementById('home').style.display="none";
  document.getElementById('game').classList.add('on');
  showing="q"; rebuild();
}
function goHome(){
  document.getElementById('game').classList.remove('on');
  document.documentElement.style.cssText="";  // テーマを既定へ
  document.getElementById('home').style.display="flex";
  renderHome();
}

function rebuild(){
  tick=0; queue=[]; combo=0;
  if(!document.getElementById('card')) restoreMain();
  const ps=pool();
  const fresh=ps.filter(c=>rankOf(c.id)<0), seen=ps.filter(c=>rankOf(c.id)>=0);
  shuffle(fresh); shuffle(seen);
  let t=0;
  fresh.forEach(c=>{ queue.push({id:c.id,due:t}); t+=1; });
  seen.forEach(c=>{ const N=STEPS[rankOf(c.id)]; queue.push({id:c.id,due:t+Math.round(N*(0.3+Math.random()*0.5))}); });
  render();
}
function nextCard(){ if(!queue.length)return null; queue.sort((a,b)=>a.due-b.due); return queue[0]; }
function byId(id){ return S.cards.find(c=>c.id===id); }

const MAINHTML = document.getElementById('main').innerHTML;
function restoreMain(){ document.getElementById('main').innerHTML=MAINHTML; bindCard(); }
function bindCard(){
  document.getElementById('card').addEventListener('click',()=>{ if(showing==="q") reveal(); });
  document.getElementById('card').addEventListener('keydown',e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault(); showing==="q"?reveal():judge(true);} });
  document.getElementById('revealBtn').onclick=reveal;
  document.getElementById('againBtn').onclick=()=>judge(false);
  document.getElementById('goodBtn').onclick=()=>judge(true);
}

function renderPet(){
  const idx=stageIdx(S.stages,data.points); const st=S.stages[idx];
  document.getElementById('avatar').textContent=st.emoji;
  document.getElementById('pname').textContent=st.name;
  document.getElementById('pword').textContent=st.word;
  const next=S.stages[idx+1];
  const eb=document.getElementById('evobar'), en=document.getElementById('evonext');
  if(next){ const span=next.pt-st.pt, cur=data.points-st.pt;
    eb.style.width=Math.max(0,Math.min(100,cur/span*100))+"%";
    en.textContent="つぎまで あと "+(next.pt-data.points)+" ポイント"; }
  else { eb.style.width="100%"; en.textContent="さいだい とうたつ！"; }
}
function renderMaster(){
  const ps=pool(); const mastered=ps.filter(c=>rankOf(c.id)>=MASTER_RANK).length;
  document.getElementById('left').textContent=ps.length-mastered;
  const pct=ps.length? Math.round(mastered/ps.length*100):0;
  document.getElementById('mpct').textContent=pct;
  document.getElementById('mbar').style.width=pct+"%";
}
function render(){
  if(!document.getElementById('card')) restoreMain();
  document.getElementById('pts').textContent=data.points;
  renderPet(); renderMaster();
  const nx=nextCard(); if(!nx){ done(); return; }
  curId=nx.id; const c=byId(curId);
  const catEl=document.getElementById('cat');
  catEl.textContent=c.badge;
  const gc=S.groupColors[c.group]||{bg:"#eee",fg:"#555"};
  catEl.style.background=gc.bg; catEl.style.color=gc.fg;
  const r=rankOf(curId);
  document.getElementById('rank').textContent = r<0?"NEW":(r>=MASTER_RANK?"覚えた Lv."+(r+1):"Lv."+(r+1));
  const combEl=document.getElementById('combo');
  if(combo>=2){ combEl.className="combo "+comboLevel(combo); combEl.innerHTML="🔥 "+combo+" <b>"+comboPhrase(combo,curKey)+"</b>"; }
  else combEl.className="combo hidden";
  document.getElementById('qtext').textContent=c.q;
  var _qi=document.getElementById('qimg'); if(_qi){ var _is=(showing==='q')?(c.img||''):(c.imgA||c.img||''); if(_is){_qi.src=_is;_qi.style.display='block';} else {_qi.removeAttribute('src');_qi.style.display='none';} }
  document.getElementById('atext').textContent=c.a;
  const adiv=document.getElementById('adiv');
  if(showing==="q"){
    document.getElementById('qtext').className="qtext big";
    adiv.classList.remove('show');
    document.getElementById('hint').style.display="block";
    document.getElementById('revealWrap').style.display="block";
    document.getElementById('judgeWrap').style.display="none";
  }else{
    document.getElementById('qtext').className="qtext small";
    adiv.classList.add('show');
    document.getElementById('hint').style.display="none";
    document.getElementById('revealWrap').style.display="none";
    document.getElementById('judgeWrap').style.display="flex";
  }
}
function reveal(){ showing="a"; render(); }
function floatShow(txt,cls){ const f=document.getElementById('float'); f.textContent=txt; f.className="float "+cls; void f.offsetWidth; f.classList.add('go'); setTimeout(()=>{f.className="float";},1000); }
function toast(html){ const t=document.getElementById('toast'); t.innerHTML=html; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); }

function judge(ok){
  const id=curId; const before=stageIdx(S.stages,data.points);
  const beforeM = pool().filter(c=>rankOf(c.id)>=MASTER_RANK).length;
  queue=queue.filter(q=>q.id!==id);
  const due=schedule(id,ok); queue.push({id,due});
  if(ok){
    data.points+=1; combo+=1; let bonus=0;
    if(combo%10===0) bonus+=5; else if(combo%5===0) bonus+=3;
    data.points+=bonus; if(combo>data.maxCombo) data.maxCombo=combo;
    if(bonus){ floatShow("+"+(1+bonus),"bonus"); toast('<span class="big">🔥</span><b>'+comboPhrase(combo,curKey)+'</b><br>'+combo+'れんぞく ＋'+bonus+'！'); }
    else floatShow("+1","plus");
  }else{ data.points=Math.max(0,data.points-1); combo=0; floatShow("-1","minus"); }
  showing="q"; tick++;
  const after=stageIdx(S.stages,data.points);
  if(after>before){ const st=S.stages[after];
    document.getElementById('pet').classList.add('evolve');
    setTimeout(()=>document.getElementById('pet').classList.remove('evolve'),1000);
    toast('<span class="big">'+st.emoji+'</span>「'+st.name+'」に なった！'); }
  const ps=pool(); const mastered=ps.filter(c=>rankOf(c.id)>=MASTER_RANK).length;
  save();
  if(mastered===ps.length && ps.length>0 && beforeM<ps.length){ celebrate(); }
  render();
}
function done(){
  const idx=stageIdx(S.stages,data.points); const st=S.stages[idx];
  document.getElementById('main').innerHTML=
    '<div class="done"><div class="hero">'+st.emoji+'</div><h2>このセット完了！</h2>'+
    '<p>いまの きみ：<b>'+st.name+'</b><br>ポイント '+data.points+' ／ さいこうコンボ '+data.maxCombo+'<br><br>'+
    'まちがえたカードは早めに、できたカードはだんだん間をあけて出てくるよ。</p>'+
    '<button class="btn big" id="againAll" style="max-width:320px;margin-top:10px;">もう一周する</button></div>';
  document.getElementById('againAll').onclick=rebuild;
}

document.getElementById('back').onclick=goHome;
document.getElementById('exportBtn').onclick=exportCSV;
document.getElementById('celebrate').onclick=function(){ this.classList.remove('on'); this.querySelectorAll('.confetti').forEach(e=>e.remove()); };
document.getElementById('restart').onclick=()=>{
  if(confirm(S.name+" の 記録・ポイント・キャラを ぜんぶ消して 最初からにする？")){
    data={srs:{},points:0,maxCombo:0}; save(); showing="q"; rebuild();
  }
};
// ===== クラウド同期（Firebase設定があれば有効） =====
const SUBJECT_KEYS = Object.values(SUBJECTS).map(s=>s.key);
function collectAll(){ const o={}; SUBJECT_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v){ try{o[k]=JSON.parse(v);}catch(e){} } }); return o; }
window.__onCloud__ = function(d){
  let changed=false;
  SUBJECT_KEYS.forEach(k=>{ if(d && d[k]!=null){ const incoming=JSON.stringify(d[k]);
    if(localStorage.getItem(k)!==incoming){ try{ localStorage.setItem(k,incoming); changed=true; }catch(e){} } } });
  if(changed){
    if(document.getElementById('home').style.display!=="none"){ renderHome(); }
    else if(S){ data=readData(S.key); renderPet(); renderMaster(); document.getElementById('pts').textContent=data.points; }
  }
};
function syncBadge(){
  const on = !!(window.__SYNC__ && window.__SYNC__.enabled);
  const el=document.getElementById('syncDot'); if(el){ el.textContent = on ? "☁︎ 同期オン" : "📱 この端末のみ"; el.style.color = on ? "var(--main)" : "#9a9e96"; }
}
window.__syncReady__ = syncBadge;

function pad(n){ return n<10?"0"+n:""+n; }
function exportCSV(){
  const rows=[["教科","カテゴリ","問題","答え","出題回数","正解","不正解","正答率(%)","今のレベル","覚えた"]];
  Object.keys(SUBJECTS).forEach(key=>{
    const sub=SUBJECTS[key]; const d=readData(sub.key);
    sub.cards.forEach(c=>{
      const s=d.srs[c.id]||{}; const seen=s.seen||0, right=s.right||0, wrong=s.wrong||0;
      const rank=(s.rank!=null)?s.rank:-1;
      const rate=seen? Math.round(right/seen*100):"";
      const lv = rank<0?"未学習":("Lv."+(rank+1));
      const mastered = rank>=MASTER_RANK?"○":"";
      rows.push([sub.name, c.badge, c.q, c.a, seen, right, wrong, rate, lv, mastered]);
    });
  });
  const csv = rows.map(r=>r.map(cell=>{
    const v=String(cell).replace(/"/g,'""');
    return /[",\n]/.test(v) ? '"'+v+'"' : v;
  }).join(",")).join("\r\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const t=new Date(); const today=t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate());
  a.href=url; a.download="rina_kiroku_"+today+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

bindCard();
renderHome();
setTimeout(syncBadge, 1500);
</script>

     下の firebaseConfig に、自分の Firebase プロジェクトの設定を貼ると、
     何台の端末でも進捗が自動で同期されます。
     空のままなら、その端末だけにデータが保存されます（同期オフ）。 -->
<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyC7K-78iykJjbQUwAolNgtltJLmtgdBCB4",
    authDomain: "rina-cards.firebaseapp.com",
    projectId: "rina-cards",
    storageBucket: "rina-cards.firebasestorage.app",
    messagingSenderId: "383374729327",
    appId: "1:383374729327:web:3a31cbdc709a7c82e12d9a"
  };
  const DOC_PATH = ["study", "rina"];   // 莉奈さん専用の保存場所（変更不要）
  window.__SYNC__ = { enabled:false };
  if(firebaseConfig.projectId){
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getFirestore, doc, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const ref = doc(db, DOC_PATH[0], DOC_PATH[1]);
      let pushTimer=null;
      window.__SYNC__.enabled = true;
      window.__SYNC__.push = (allData)=>{
        clearTimeout(pushTimer);
        pushTimer = setTimeout(async ()=>{ try{ await setDoc(ref, {...allData, updatedAt: Date.now()}, {merge:true}); }catch(e){ console.warn("push fail", e); } }, 600);
      };
      onSnapshot(ref, (snap)=>{ if(snap.exists() && window.__onCloud__) window.__onCloud__(snap.data()); }, (err)=>console.warn("sync err", err));
      if(window.__syncReady__) window.__syncReady__();
    }catch(e){ console.warn("sync init failed", e); window.__SYNC__.enabled=false; }
  }
</script>
